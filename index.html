<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASL Messenger</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Firebase SDKs (v9 Compat Mode) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --primary-color: #1A73E8;
      --bg-color: #F0F2F5;
      --card-bg: #FFFFFF;
      --text-main: #1C1E21;
      --text-muted: #65676B;
      --border-color: #E4E6EB;
      --sent-msg: #E3F2FD;
      --received-msg: #FFFFFF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background-color: #121212; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

    .app-container {
      width: 100%; max-width: 480px; height: 100vh; max-height: 900px;
      background: var(--bg-color); display: flex; flex-direction: column;
      position: relative; box-shadow: 0 12px 32px rgba(0,0,0,0.5); overflow: hidden;
    }
    @media (min-width: 481px) { .app-container { height: 92vh; border-radius: 20px; } }

    .screen { display: none; flex-direction: column; height: 100%; width: 100%; background: var(--bg-color); overflow-y: auto; }
    .screen.active { display: flex; }

    header {
      background: var(--card-bg); padding: 14px 16px; display: flex;
      justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color);
      position: sticky; top: 0; z-index: 10;
    }
    header h2 { font-size: 20px; color: var(--primary-color); font-weight: 700; }

    .icon-btn { background: none; border: none; color: var(--primary-color); font-size: 18px; cursor: pointer; padding: 6px; }
    .btn { background: var(--primary-color); color: #fff; border: none; padding: 12px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; }
    .btn-google { background: #4285F4; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-secondary { background: #E4E6EB; color: var(--text-main); }
    .btn-danger { background: #d93025; }

    .input-field { width: 100%; padding: 12px 14px; margin-bottom: 10px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; outline: none; }
    
    .tab-content { flex: 1; overflow-y: auto; padding-bottom: 60px; }
    nav.tab-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; background: var(--card-bg); display: flex; border-top: 1px solid var(--border-color); z-index: 20; }
    .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); font-size: 11px; cursor: pointer; }
    .tab-item.active { color: var(--primary-color); font-weight: 600; }

    .list-item { display: flex; align-items: center; padding: 12px 16px; background: var(--card-bg); border-bottom: 1px solid var(--border-color); cursor: pointer; }
    .avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; margin-right: 12px; }
    .item-details { flex: 1; min-width: 0; }
    .item-title { font-weight: 600; font-size: 15px; }
    .item-sub { font-size: 12px; color: var(--text-muted); }

    .chat-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 30; display: none; flex-direction: column; }
    .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .message-bubble { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .message-bubble.sent { align-self: flex-end; background: var(--sent-msg); }
    .message-bubble.received { align-self: flex-start; background: var(--received-msg); }

    .chat-input-bar { background: var(--card-bg); padding: 10px 12px; display: flex; align-items: center; gap: 8px; }
    .chat-input-bar input { flex: 1; border: 1px solid var(--border-color); border-radius: 20px; padding: 10px 14px; outline: none; }

    .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 50; display: none; justify-content: center; align-items: center; }
    .modal-content { background: var(--card-bg); width: 90%; max-width: 380px; border-radius: 12px; padding: 20px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="app-container">

  <!-- AUTH SCREEN -->
  <div id="authScreen" class="screen active">
    <div style="padding: 24px; text-align: center; margin: auto 0;">
      <i class="fa-solid fa-comments" style="font-size: 48px; color: var(--primary-color); margin-bottom: 12px;"></i>
      <h1 style="margin-bottom: 8px;">ASL Messenger</h1>
      <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 24px;">Authenticating via Firebase</p>

      <button class="btn btn-google" onclick="authApp.loginWithGoogle()">
        <i class="fa-brands fa-google"></i> Login with Google
      </button>
    </div>
  </div>

  <!-- MAIN DASHBOARD -->
  <div id="mainDashboard" class="screen">
    <header>
      <h2>ASL Messenger</h2>
      <button class="icon-btn" onclick="app.openModal('addFriendModal')"><i class="fa-solid fa-user-plus"></i></button>
    </header>

    <div id="chatsTab" class="tab-content">
      <div id="chatsList"></div>
    </div>

    <div id="peopleTab" class="tab-content hidden">
      <div style="padding:10px 16px; font-weight:bold; color:gray; font-size:12px;">FRIEND REQUESTS</div>
      <div id="requestsList"></div>
      <div style="padding:10px 16px; font-weight:bold; color:gray; font-size:12px;">MY FRIENDS</div>
      <div id="friendsList"></div>
    </div>

    <div id="settingsTab" class="tab-content hidden">
      <div style="padding: 16px; text-align:center;">
        <img id="myAvatar" class="avatar" style="width:80px; height:80px; margin-bottom:10px;" src="https://picsum.photos/200">
        <h3 id="myName">User Name</h3>
        <p id="myEmail" style="font-size:12px; color:gray;"></p>
        <p id="myUid" style="font-size:11px; color:var(--primary-color); margin-top:5px; margin-bottom:15px; word-break:break-all; user-select:all;"></p>
        <button class="btn btn-danger" onclick="authApp.logout()">Logout</button>
      </div>
    </div>

    <nav class="tab-bar">
      <div class="tab-item active" onclick="app.switchTab('chats')">
        <i class="fa-solid fa-comment-dots"></i>
        <span>Chats</span>
      </div>
      <div class="tab-item" onclick="app.switchTab('people')">
        <i class="fa-solid fa-user-group"></i>
        <span>People</span>
      </div>
      <div class="tab-item" onclick="app.switchTab('settings')">
        <i class="fa-solid fa-gear"></i>
        <span>Settings</span>
      </div>
    </nav>
  </div>

  <!-- CHAT VIEW -->
  <div id="chatView" class="chat-view">
    <header>
      <button class="icon-btn" onclick="app.closeChat()"><i class="fa-solid fa-arrow-left"></i></button>
      <div style="flex:1; margin-left:10px;">
        <div id="chatTitle" style="font-weight:600;">User</div>
      </div>
    </header>
    <div id="chatMessages" class="chat-messages"></div>
    <div class="chat-input-bar">
      <input type="text" id="msgInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') app.sendMessage()">
      <button class="icon-btn" onclick="app.sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>

  <!-- ADD FRIEND MODAL -->
  <div id="addFriendModal" class="modal">
    <div class="modal-content">
      <h3 style="margin-bottom:8px;">Add Friend</h3>
      <p style="font-size:12px; color:gray; margin-bottom:10px;">Paste your friend's UID here:</p>
      <input type="text" id="friendUidInput" class="input-field" placeholder="Target User UID">
      <div style="display:flex; gap:10px; margin-top:10px;">
        <button class="btn btn-secondary" onclick="app.closeModal('addFriendModal')">Cancel</button>
        <button class="btn" onclick="app.sendFriendRequest()">Send Request</button>
      </div>
    </div>
  </div>

</div>

<script>
  // ==================== FIREBASE CONFIGURATION ====================
  const firebaseConfig = {
    apiKey: "AIzaSyB4mHK8vq_dVKs8f8FHGvPKof4kkVR1Uzs",
    authDomain: "asl-messenger-85a1b.firebaseapp.com",
    projectId: "asl-messenger-85a1b",
    storageBucket: "asl-messenger-85a1b.firebasestorage.app",
    messagingSenderId: "593020086365",
    appId: "1:593020086365:web:fd4b8e5800c1079cef05b4",
    measurementId: "G-0CBVDQ989P"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;
  let activeChatUid = null;

  // ==================== AUTHENTICATION LOGIC ====================
  class AuthController {
    constructor() {
      auth.onAuthStateChanged(user => {
        if (user) {
          currentUser = user;
          this.saveUserProfile(user);
          document.getElementById('authScreen').classList.remove('active');
          document.getElementById('mainDashboard').classList.add('active');
          app.initDashboard();
        } else {
          document.getElementById('authScreen').classList.add('active');
          document.getElementById('mainDashboard').classList.remove('active');
        }
      });
    }

    loginWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(e => alert(e.message));
    }

    saveUserProfile(user) {
      db.collection('users').doc(user.uid).set({
        uid: user.uid,
        name: user.displayName || "User",
        email: user.email || "",
        photo: user.photoURL || "https://picsum.photos/200"
      }, { merge: true });
    }

    logout() { auth.signOut(); }
  }

  // ==================== REALTIME APP LOGIC (FIRESTORE) ====================
  class AppController {
    initDashboard() {
      document.getElementById('myName').textContent = currentUser.displayName || "User";
      document.getElementById('myEmail').textContent = currentUser.email || "";
      document.getElementById('myUid').textContent = "My UID: " + currentUser.uid;
      if (currentUser.photoURL) document.getElementById('myAvatar').src = currentUser.photoURL;

      this.loadFriendsAndChats();
      this.loadFriendRequests();
    }

    switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
      document.getElementById(tab + 'Tab').classList.remove('hidden');
      event.currentTarget.classList.add('active');
    }

    sendFriendRequest() {
      const targetUid = document.getElementById('friendUidInput').value.trim();
      if (!targetUid || targetUid === currentUser.uid) return alert('Invalid User UID');

      db.collection('requests').doc(targetUid).collection('incoming').doc(currentUser.uid).set({
        fromUid: currentUser.uid,
        fromName: currentUser.displayName || "User"
      }).then(() => {
        alert('Friend Request Sent!');
        this.closeModal('addFriendModal');
      }).catch(err => alert("Error: " + err.message));
    }

    loadFriendRequests() {
      db.collection('requests').doc(currentUser.uid).collection('incoming')
        .onSnapshot(snapshot => {
          const list = document.getElementById('requestsList');
          list.innerHTML = '';
          snapshot.forEach(doc => {
            const req = doc.data();
            list.innerHTML += `
              <div class="list-item">
                <div class="item-details">
                  <div class="item-title">${req.fromName}</div>
                </div>
                <button class="btn" style="width:auto; padding:6px 12px;" onclick="app.acceptFriend('${req.fromUid}')">Accept</button>
              </div>`;
          });
        });
    }

    acceptFriend(targetUid) {
      db.collection('users').doc(currentUser.uid).collection('friends').doc(targetUid).set({ active: true });
      db.collection('users').doc(targetUid).collection('friends').doc(currentUser.uid).set({ active: true });
      db.collection('requests').doc(currentUser.uid).collection('incoming').doc(targetUid).delete();
      alert('Friend Accepted!');
    }

    loadFriendsAndChats() {
      db.collection('users').doc(currentUser.uid).collection('friends')
        .onSnapshot(snapshot => {
          const chatsList = document.getElementById('chatsList');
          const friendsList = document.getElementById('friendsList');
          chatsList.innerHTML = '';
          friendsList.innerHTML = '';

          snapshot.forEach(doc => {
            const friendUid = doc.id;
            db.collection('users').doc(friendUid).get().then(uSnap => {
              const u = uSnap.data();
              if (!u) return;

              const friendHTML = `
                <div class="list-item" onclick="app.openChat('${u.uid}', '${u.name}')">
                  <img src="${u.photo}" class="avatar">
                  <div class="item-details">
                    <div class="item-title">${u.name}</div>
                    <div class="item-sub">Tap to open real-time chat</div>
                  </div>
                </div>`;

              chatsList.innerHTML += friendHTML;
              friendsList.innerHTML += friendHTML;
            });
          });
        });
    }

    openChat(uid, name) {
      activeChatUid = uid;
      document.getElementById('chatTitle').textContent = name;
      document.getElementById('chatView').style.display = 'flex';
      this.listenForMessages();
    }

    closeChat() {
      document.getElementById('chatView').style.display = 'none';
      activeChatUid = null;
    }

    getChatRoomId() {
      return currentUser.uid < activeChatUid 
        ? `${currentUser.uid}_${activeChatUid}` 
        : `${activeChatUid}_${currentUser.uid}`;
    }

    sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || !activeChatUid) return;

      const roomId = this.getChatRoomId();
      db.collection('chats').doc(roomId).collection('messages').add({
        sender: currentUser.uid,
        text: text,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });

      input.value = '';
    }

    listenForMessages() {
      const roomId = this.getChatRoomId();
      db.collection('chats').doc(roomId).collection('messages')
        .orderBy('timestamp', 'asc')
        .onSnapshot(snapshot => {
          const container = document.getElementById('chatMessages');
          container.innerHTML = '';
          snapshot.forEach(doc => {
            const msg = doc.data();
            const isMe = msg.sender === currentUser.uid;
            container.innerHTML += `
              <div class="message-bubble ${isMe ? 'sent' : 'received'}">
                ${msg.text}
              </div>`;
          });
          container.scrollTop = container.scrollHeight;
        });
    }

    openModal(id) { document.getElementById(id).style.display = 'flex'; }
    closeModal(id) { document.getElementById(id).style.display = 'none'; }
  }

  const authApp = new AuthController();
  const app = new AppController();
</script>

</body>
</html>
