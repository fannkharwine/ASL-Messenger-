name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Cordova & Build APK
      run: |
        npm install -g cordova
        cordova create myApp com.fannkharwine.aslmessenger "ASL Messenger"
        cd myApp
        rm -rf www/*
        cp -r ../* www/ 2>/dev/null || true
        rm -rf www/myApp www/node_modules www/.git www/.github
        cordova platform add android
        cordova build android --debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ASL-Messenger-APK
        path: ./myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
