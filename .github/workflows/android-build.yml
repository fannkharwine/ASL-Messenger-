name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Build Android APK with PWABuilder
      run: |
        npx @pwabuilder/cli --manifest https://fannkharwine.github.io/ASL-Messenger-/manifest.json --platforms android --output ./android-build

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ASL-Messenger-APK
        path: ./android-build/**/*.apk
