name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Bubblewrap CLI
      run: npm install -g @bubblewrap/cli

    - name: Initialize Bubblewrap Project
      run: |
        npx @bubblewrap/cli init --manifest=https://fannkharwine.github.io/ASL-Messenger-/manifest.json --directory=android-project

    - name: Build Android APK
      run: |
        cd android-project
        npx @bubblewrap/cli build --skipSigning

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ASL-Messenger-APK
        path: ./android-project/*.apk
