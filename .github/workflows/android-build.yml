name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Prepare Web Assets & Capacitor
      run: |
        mkdir www
        cp index.html manifest.json logo.png www/ 2>/dev/null || cp index.html www/
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        echo '{"appId": "com.fannkharwine.aslmessenger", "appName": "ASL Messenger", "webDir": "www"}' > capacitor.config.json

    - name: Add Android Platform
      run: |
        npx cap add android
        npx cap sync android

    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ASL-Messenger-APK
        path: ./android/app/build/outputs/apk/debug/app-debug.apk
        
