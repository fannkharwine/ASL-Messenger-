name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: PWABuilder Android Action
      uses: pwa-builder/pwa-action@v2.0.0
      with:
        manifest_url: 'https://fannkharwine.github.io/ASL-Messenger-/manifest.json'

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ASL-Messenger-APK
        path: ./*.apk
