name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Bubblewrap
      run: npm install -g @bubblewrap/cli

    - name: Initialize and Build APK
      run: |
        yes | npx @bubblewrap/cli init --manifest=https://fannkharwine.github.io/ASL-Messenger-/manifest.json --directory=android-app
        cd android-app
        yes | npx @bubblewrap/cli build

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ASL-Messenger-APK
        path: ./android-app/*.apk
        
